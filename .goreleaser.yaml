# GoReleaser configuration (v2 schema).
# Docs: https://goreleaser.com
#
# Local verification (no publishing):
#   goreleaser check
#   goreleaser release --snapshot --clean
#
# Real release is driven by .github/workflows/release.yml on a `v*` tag push.
version: 2

project_name: intervals-icu-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: intervals
    main: .
    # Archives must yield an `intervals` command on the user's PATH, even though
    # the module dir (and `go install` target) is named intervals-icu-cli.
    binary: intervals
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/glebmish/intervals-icu-cli/internal/cmd.version={{ .Version }}
      - -X github.com/glebmish/intervals-icu-cli/internal/cmd.commit={{ .Commit }}
      - -X github.com/glebmish/intervals-icu-cli/internal/cmd.date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # No windows/arm64 build requested.
      - goos: windows
        goarch: arm64

archives:
  - id: intervals
    ids:
      - intervals
    # tar.gz everywhere except Windows, which gets a zip.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: glebmish
    name: intervals-icu-cli
  draft: false
  prerelease: auto

# GoReleaser v2.16 hard-deprecated `brews` (formulae) in favor of
# `homebrew_casks`. Casks install the prebuilt binaries directly. Users still
# install via `brew install glebmish/tap/intervals`.
homebrew_casks:
  - name: intervals
    ids:
      - intervals
    binaries:
      - intervals
    # Push the cask to the user's own tap repo. GITHUB_TOKEN cannot push
    # cross-repo, so the workflow supplies a PAT via HOMEBREW_TAP_TOKEN.
    repository:
      owner: glebmish
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/glebmish/intervals-icu-cli"
    description: "CLI for the intervals.icu training analytics API"
    # Skip the cask bump on snapshot/prerelease so dry-runs never touch the tap.
    skip_upload: auto
    # Remove the macOS quarantine xattr so the unsigned binary runs without the
    # "cannot be opened because it is from an unidentified developer" prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/intervals"]
          end
